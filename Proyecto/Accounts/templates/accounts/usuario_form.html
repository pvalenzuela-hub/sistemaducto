{% extends "components/base.html" %}

{% block title %}{{ titulo }}{% endblock %}

{% block body %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h1 class="mb-4">{{ encabezado }}</h1>
        <div class="card">
            <div class="card-body">
                {% if messages %}{% for message in messages %}<div class="alert alert-{{ message.tags }}">{{ message }}</div>{% endfor %}{% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label">Usuario</label><input name="username" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label">Contraseña</label><input name="password" type="password" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label">Nombre</label><input name="first_name" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label">Apellido</label><input name="last_name" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label">Email</label><input name="email" type="email" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label">Grupo</label><select name="group_id" class="form-select"><option value="">-</option>{% for g in grupos %}<option value="{{ g.id }}">{{ g.name }}</option>{% endfor %}</select></div>
                    </div>
                    <div class="mt-4 d-flex gap-2"><button class="btn btn-primary" type="submit">Guardar</button><a class="btn btn-secondary" href="{% url 'usuario_list' %}">Volver</a></div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
