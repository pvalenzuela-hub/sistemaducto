{% extends "components/base.html" %}

{% block title %}{{ titulo }}{% endblock %}

{% block body %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-body">
                <h1 class="mb-3">{{ encabezado }}</h1>
                <p class="text-muted">Usuario: <strong>{{ usuario.username }}</strong></p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label" for="feccon">Fecha de contrato</label>
                        <input type="date" id="feccon" name="feccon" class="form-control" value="{{ persona.feccon|date:'Y-m-d' }}" required>
                    </div>
                    <button class="btn btn-primary" type="submit">Guardar cambio</button>
                    <a href="{% url 'usuario_list' %}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
