{% extends 'components/base.html' %}
{% load static%}

		{% block styles %}
		<!-- SELECT2 CSS -->
		<link href="{% static ''%}assets/plugins/select2/select2.min.css" rel="stylesheet"/>
		{% endblock styles %}

						{% block body %}
						<!-- PAGE-HEADER -->
						<div class="page-header">

						</div>
						<!-- PAGE-HEADER END -->

						<!-- ROW -->
						<div class="row">
							<div class="col-lg-12 col-md-12">
								<div class="card">
									<div class="card-header">
										<h3 class="card-title">Registro de Vacaciones</h3>
									</div>
									<div class="card-body">
                                       
										<form class="needs-validation" novalidate method="post">
                                            {% csrf_token %}
                                            {{ form.as_p }}
											<button class="btn btn-primary" type="submit">Grabar</button>
											

										</form>
									</div>
								</div>
							</div>
						</div>
						<!-- ROW CLOSED -->
						{% endblock body %}
					
		{% block scripts %}
		<!-- SELECT2 JS -->
		<script src="{% static ''%}assets/plugins/select2/select2.full.min.js"></script>

		<!-- FORMVALIDATION JS -->
		<script src="{% static ''%}assets/js/form-validation.js"></script>
		{% endblock scripts %}
