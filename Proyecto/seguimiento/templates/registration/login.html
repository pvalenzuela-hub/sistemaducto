<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Soporte de Bienestar</title>
    {% load static %}
    <link href="{% static 'assets/plugins/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet" />
    <link href="{% static 'assets/css/style.css' %}" rel="stylesheet" />
    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(37, 179, 63, .14), transparent 28%),
                radial-gradient(circle at bottom right, rgba(13, 110, 253, .12), transparent 26%),
                linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
        }
        .login-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .login-card {
            width: 100%;
            max-width: 980px;
            border: 0;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 24px 70px rgba(15, 23, 42, .16);
            background: #fff;
        }
        .login-brand {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #fff;
            padding: 2rem 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            justify-content: center;
            min-height: 100%;
        }
        .login-logo-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border-radius: 18px;
            padding: 14px 18px;
            box-shadow: 0 10px 25px rgba(15, 23, 42, .16);
            width: fit-content;
        }
        .login-brand img {
            width: 200px;
            max-width: 100%;
            height: auto;
            display: block;
        }
        .login-brand h1 {
            font-size: 1.55rem;
            font-weight: 800;
            margin: 0;
            line-height: 1.1;
        }
        .login-brand p {
            margin: 0;
            color: rgba(255,255,255,.78);
            line-height: 1.45;
        }
        .login-form {
            padding: 2rem;
        }
        .login-form h2 {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 1.25rem;
            color: #111827;
        }
        .login-form .form-control {
            border-radius: 12px;
            min-height: 46px;
        }
        .login-form .btn-primary {
            border-radius: 12px;
            min-height: 46px;
            font-weight: 700;
        }
        @media (max-width: 767.98px) {
            .login-brand {
                padding: 1.5rem;
            }
            .login-form {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-shell">
        <div class="login-card">
            <div class="row g-0 align-items-stretch">
                <div class="col-md-5">
                    <div class="login-brand h-100">
                        <div class="login-logo-wrap">
                            <img src="{% static 'assets/images/brand/logoducto_1087x525.png' %}" alt="Ducto Proyectos">
                        </div>
                        <div>
                            <h1>Sistema de Clientes</h1>
                            <p>Accede al sistema para gestionar cotizaciones, proyectos y facturas.</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-7">
                    <div class="login-form h-100 d-flex flex-column justify-content-center">
                        <h2>Ingreso al sistema</h2>

                        {% if form.errors %}
                            <div class="alert alert-danger">
                                Usuario o contraseña incorrectos.
                            </div>
                        {% endif %}

                        <form method="post">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label for="id_username" class="form-label">Usuario</label>
                                <input type="text" name="username" id="id_username" class="form-control" required autofocus>
                            </div>

                            <div class="mb-3">
                                <label for="id_password" class="form-label">Contraseña</label>
                                <input type="password" name="password" id="id_password" class="form-control" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Ingresar</button>

                            {% if next %}
                                <input type="hidden" name="next" value="{{ next }}">
                            {% endif %}
                        </form>
                    </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'assets/js/jquery.min.js' %}"></script>
    <script src="{% static 'assets/plugins/bootstrap/js/bootstrap.min.js' %}"></script>
</body>
</html>
