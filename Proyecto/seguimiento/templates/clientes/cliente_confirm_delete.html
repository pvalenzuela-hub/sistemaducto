{% extends "components/base.html" %}

{% block title %}
    {{ titulo }}
{% endblock %}

{% block body %}
<div class="row">
    <div class="col-lg-6">
        <h1 class="mb-4">{{ encabezado }}</h1>

        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">{{ submenu }}</h5>
            </div>
            <div class="card-body">
                <p>
                    ¿Estás seguro de marcar como eliminado el cliente
                    <strong>{{ cliente.razonsocial }}</strong>?
                </p>

                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Confirmar eliminación
                    </button>
                    <a href="{% url volver_url_name %}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Cancelar
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
